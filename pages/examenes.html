<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvaluaSeguro — Exámenes</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00cec9">
    <link rel="icon" type="image/png" href="/assets/icon-192-sq.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/components.css?v=2">

    <style>
        body { font-family: 'Inter', sans-serif; background: var(--bg-body, #f4f1eb); }
        .page-content { max-width: 800px; margin: 0 auto; padding: 1.5rem 1rem; padding-bottom: 100px; }
        
        .page-header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 1.5rem; font-weight: 800; color: var(--text-primary); margin: 0; }
        .page-subtitle { font-size: 0.95rem; color: var(--text-secondary); margin-top: 0.2rem; }

        .btn-primary {
            background: #00cec9; color: white; border: none;
            padding: 0.75rem 1.25rem; border-radius: 12px;
            font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .btn-primary:hover { background: #01b1ad; }

        .exam-card {
            background: var(--bg-card, white);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid var(--glass-border, rgba(0,0,0,0.06));
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
            display: flex; gap: 1rem; align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .exam-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,206,201,0.15);
            border-color: #00cec9;
        }

        .exam-icon {
            font-size: 2.5rem;
            background: rgba(0, 206, 201, 0.1);
            width: 70px; height: 70px;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .exam-details { flex: 1; }
        .exam-title { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
        .exam-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.3; }

        .exam-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem; font-weight: 700;
            background: rgba(0, 184, 148, 0.1);
            color: #00b894;
        }

        /* Teacher Actions */
        .teacher-actions { margin-top: 10px; display: flex; gap: 0.5rem; }
        .btn-outline {
            background: transparent; border: 1px solid #00cec9; color: #00cec9;
            padding: 0.4rem 0.8rem; border-radius: 8px; font-size: 0.75rem; font-weight: 600;
            cursor: pointer;
        }
        .btn-outline:hover { background: rgba(0,206,201,0.1); }

    </style>
</head>
<body>

<script src="/js/components/firebase-init.js"></script>
<script src="/js/components/header.js"></script>
<script src="/js/components/bottom-nav.js"></script>
<script src="/js/components/auth-guard.js"></script>

<div class="page-content" id="page-content" style="display:none;">
    
    <div class="page-header">
        <div>
            <h1 class="page-title">📝 Exámenes</h1>
            <p class="page-subtitle" id="subtitle-text">Cargando...</p>
        </div>
        <div id="teacher-header-actions" style="display: none;">
            <button class="btn-primary" onclick="Swal.fire('Próximamente', 'La función de crear exámenes personalizados se activará en breve.', 'info')">
                + Crear Examen
            </button>
        </div>
    </div>

    <!-- Contenedor dinámico de lista de exámenes -->
    <div id="exams-container"></div>

</div>

<script>
    authGuard(function(user, role) {
        // Bloquear acceso a usuarios normales (solo pueden ver esto los estudiantes, profesores y admins)
        if (role === 'free' || role === 'basico' || role === 'premium') {
            window.location.href = '/pages/inicio.html';
            return;
        }

        if (typeof populateHeader === 'function') populateHeader(user, role);
        if (typeof renderBottomNav === 'function') renderBottomNav(role);
        
        document.getElementById('page-content').style.display = 'block';

        const isTeacher = role === 'profesor' || role === 'admin';
        
        document.getElementById('subtitle-text').textContent = isTeacher 
            ? 'Gestiona, crea y asigna evaluaciones a tus grupos.' 
            : 'Listado de simulacros y pruebas asignadas a tu grupo.';
            
        if(isTeacher) {
            document.getElementById('teacher-header-actions').style.display = 'block';
        }

        renderExams(isTeacher);
    });

    function renderExams(isTeacher) {
        const container = document.getElementById('exams-container');
        
        // Base structure: In reality this would come from Firestore
        const exams = [
            { id: 'sim_1', title: 'Simulacro Docente 2024', desc: 'Prueba completa con aptitud numérica, verbal y pedagógica.', icon: '📚' },
            { id: 'sim_2', title: 'Directivos Docentes', desc: 'Enfocado en liderazgo, gestión escolar y normatividad.', icon: '🎯' },
            { id: 'sim_3', title: 'Orientadores', desc: 'Casos prácticos sobre convivencia y psicología educativa.', icon: '🧠' }
        ];

        let html = '';
        
        exams.forEach(exam => {
            let actionsHTML = '';
            if(isTeacher) {
                actionsHTML = `
                <div class="teacher-actions" onclick="event.preventDefault();">
                    <button class="btn-outline" onclick="Swal.fire('Asignar', 'Selecciona el grupo al que deseas enviar este examen.', 'info')">👥 Asignar a Grupo</button>
                    <button class="btn-outline" onclick="Swal.fire('Editar', 'Edición de preguntas disponible pronto.', 'info')">✏️ Editar</button>
                </div>`;
            }

            html += `
            <a href="/pages/inicio.html" class="exam-card">
                <div class="exam-icon">${exam.icon}</div>
                <div class="exam-details">
                    <div class="exam-title">${exam.title}</div>
                    <div class="exam-desc">${exam.desc}</div>
                    ${actionsHTML}
                    ${!isTeacher ? `<div class="exam-badge">Disponible para tu grupo</div>` : ''}
                </div>
            </a>`;
        });

        container.innerHTML = html;
    }
</script>

</body>
</html>
