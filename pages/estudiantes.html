<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvaluaSeguro — Estudiantes</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00cec9">
    <link rel="icon" type="image/png" href="/assets/icon-192-sq.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/components.css?v=2">

    <link rel="stylesheet" href="/css/estudiantes.css">
</head>
<body class="admin-page">

<script src="/js/components/firebase-init.js"></script>
<script src="/js/components/header.js"></script>
<script src="/js/components/bottom-nav.js"></script>
<script src="/js/components/auth-guard.js"></script>

<div class="page-content" id="page-content" style="display:none; padding-bottom: 120px;">
    
    <!-- PESTAÑAS -->
    <div class="tabs-container">
        <div class="admin-tab active" data-tab="estudiantes">Estudiantes</div>
        <div class="admin-tab" data-tab="docentes">Docentes</div>
        <div class="admin-tab" data-tab="usuarios">Usuarios</div>
    </div>

    <!-- FILTROS -->
    <div class="filters-container">
        <div class="select-wrapper" style="flex: 1; display:none;" id="filter-group-container">
            <select class="filter-select">
                <option value="grupos">GRUPOS</option>
            </select>
        </div>
        <input type="text" class="filter-search" placeholder="🔍 Buscar por nombre o email..." id="search-input">
    </div>

    <!-- CONTENEDOR DE LISTA DE USUARIOS -->
    <div id="users-list-container">
        <!-- Las tarjetas se insertarán aquí dinámicamente -->
        <div class="empty-state-light" id="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <h3>Cargando usuarios...</h3>
        </div>
    </div>

</div>

<!-- Template oculto para clonar tarjetas en JS -->
<template id="user-card-template">
    <div class="user-card">
        <div class="user-avatar">
            <img src="" class="avatar-img" alt="Avatar">
        </div>
        <div class="user-content">
            <div class="user-info">
                <h3 class="user-name">NOMBRE AQUI</h3>
                <p class="user-email">correo@ejemplo.com</p>
                <div class="user-group-badge" style="display:none;">GRUPO</div>
            </div>
            <div class="user-actions">
                <button class="btn-actividad">ACTIVIDAD</button>
                <button class="btn-role-badge btn-edit" title="Cambiar Rol">
                    <svg class="role-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span class="role-text">DOCENTE</span>
                </button>
                <button class="btn-icon btn-download" title="Descargar Reporte">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </button>
            </div>
        </div>
    </div>
</template>

<script src="/js/pages/estudiantes-admin.js"></script>

<script>
    authGuard(function(user, role) {
        if (role !== 'profesor' && role !== 'admin') {
            window.location.href = '/pages/inicio.html';
            return;
        }

        if (typeof populateHeader === 'function') populateHeader(user, role);
        if (typeof renderBottomNav === 'function') renderBottomNav(role);
        
        // Inicializar el administrador de usuarios
        if (typeof initUsersAdmin === 'function') {
            initUsersAdmin();
        }
        
        document.getElementById('page-content').style.display = 'block';
    });
</script>

</body>
</html>
