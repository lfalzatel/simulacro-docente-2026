<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvaluaSeguro — Inicia sesión</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00cec9">
    <link rel="icon" type="image/png" href="/assets/icon-192-sq.png">
    <link rel="apple-touch-icon" href="/assets/icon-192-sq.png">

    <!-- SEO -->
    <meta name="description" content="Plataforma segura de evaluación y simulacros para el concurso docente 2026.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/components.css?v=2">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body, #f4f1eb);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            padding-bottom: 1.5rem;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        /* Logo */
        .login-logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .login-logo-img {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,206,201,0.25);
        }
        .login-app-name {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-primary, #2d3436);
            letter-spacing: -0.5px;
        }
        .login-app-name span { color: #00cec9; }
        .login-tagline {
            font-size: 0.85rem;
            color: var(--text-secondary, #636e72);
            text-align: center;
            line-height: 1.5;
        }

        /* Card */
        .login-card {
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.06);
        }

        .login-card h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary, #2d3436);
            margin-bottom: 1.25rem;
        }

        /* Botón Google */
        .google-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.875rem 1.5rem;
            background: white;
            border: 1.5px solid rgba(0,0,0,0.12);
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #3c4043;
            cursor: pointer;
            transition: box-shadow 0.2s, border-color 0.2s, background 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .google-btn:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            border-color: rgba(0,0,0,0.2);
            background: #fafafa;
        }
        .google-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .google-icon { width: 20px; height: 20px; flex-shrink: 0; }

        /* Cargando */
        .login-loading {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 0;
            color: var(--text-secondary, #636e72);
            font-size: 0.9rem;
        }
        .spinner {
            width: 28px; height: 28px;
            border: 3px solid rgba(0,206,201,0.2);
            border-top-color: #00cec9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Install btn */
        .install-btn {
            width: 100%;
            padding: 0.75rem;
            border-radius: 14px;
            border: 1.5px dashed #00cec9;
            background: rgba(0,206,201,0.05);
            color: #00cec9;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
            transition: background 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .install-btn:hover { background: rgba(0,206,201,0.1); }

        .error-msg {
            color: #d63031;
            font-size: 0.82rem;
            text-align: center;
            margin-top: 0.75rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-wrapper">

    <!-- Logo -->
    <div class="login-logo-area">
        <img src="/assets/icon-192-sq.png" alt="EvaluaSeguro" class="login-logo-img"
             onerror="this.style.display='none'">
        <div class="login-app-name">Evalua<span>Seguro</span></div>
        <p class="login-tagline">
            Plataforma segura de evaluación y simulacros<br>
            para el concurso docente 2026
        </p>
    </div>

    <!-- Card de login -->
    <div class="login-card">
        <h2>Inicia sesión para continuar</h2>

        <button class="google-btn" id="googleLoginBtn">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Iniciar con Google
        </button>

        <p class="error-msg" id="errorMsg"></p>

        <button class="install-btn" id="installBtn">
            📲 Instalar App
        </button>
    </div>

    <!-- Estado de carga -->
    <div class="login-loading" id="loginLoading">
        <div class="spinner"></div>
        <span>Verificando sesión...</span>
    </div>

</div>

<!-- Firebase Init -->
<script src="/js/components/firebase-init.js"></script>

<script>
    // Si ya hay sesión activa → redirigir directo a inicio
    auth.onAuthStateChanged((user) => {
        if (user) {
            window.location.replace('/pages/inicio.html');
        }
    });

    // Botón Google
    const loginBtn  = document.getElementById('googleLoginBtn');
    const loadingEl = document.getElementById('loginLoading');
    const errorMsg  = document.getElementById('errorMsg');

    loginBtn.addEventListener('click', async () => {
        loginBtn.disabled = true;
        loadingEl.style.display = 'flex';
        errorMsg.style.display  = 'none';

        try {
            const provider = new firebase.auth.GoogleAuthProvider();
            await auth.signInWithPopup(provider);
            // onAuthStateChanged redirige automáticamente
        } catch (err) {
            console.error('Error login:', err);
            loginBtn.disabled = false;
            loadingEl.style.display = 'none';

            const msgs = {
                'auth/popup-blocked'   : 'El navegador bloqueó la ventana emergente. Permite las ventanas emergentes para este sitio.',
                'auth/popup-closed-by-user': 'Cerraste la ventana antes de completar el inicio de sesión.',
                'auth/network-request-failed': 'Sin conexión a internet. Verifica tu red.',
            };
            errorMsg.textContent = msgs[err.code] || 'Error al iniciar sesión. Intenta de nuevo.';
            errorMsg.style.display = 'block';
        }
    });

    // PWA Install
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'flex';
    });
    document.getElementById('installBtn').addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt = null;
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
</script>

</body>
</html>
